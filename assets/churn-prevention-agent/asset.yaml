apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: churn-prevention-agent
  version: 1.0.0
  description: "Python AI agent that ingests S/4HANA sales order data, scores customer churn risk via AI Core, dispatches Joule alerts, and logs all actions to BTP Audit Log."

type: agent

container:
  buildPath: .
  port: 5000
  env:
    PYTHONUNBUFFERED: "1"
    PYTHONDONTWRITEBYTECODE: "1"
    PORT: "5000"

resources:
  requests:
    memory: "1Gi"
    cpu: "200m"
  limits:
    memory: "1.5Gi"
    cpu: "1"

service:
  apiAuth:
    type: no_auth

requires:
  - name: sales_order_mcp_demo
    kind: mcp-server
    ordId: sap.mcpbuilder:apiResource:sales_order_mcp_demo:v1
  - name: account-service-mcp
    kind: mcp-server
    ordId: customer.mcpbuilder.c4c:apiResource:account_service:v1
  - name: opportunity-service-mcp
    kind: mcp-server
    ordId: customer.mcpbuilder.c4c:apiResource:opportunity_service:v1

probes:
  startup:
    path: /.well-known/agent-card.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 36
  liveness:
    path: /.well-known/agent-card.json
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent-card.json
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
